services:
  - type: web
    name: nexusai-gateway
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: DATABASE_URL
        value: sqlite:////tmp/proxy.db
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: USDT_TRC20_ADDRESS
        sync: false
      - key: USDT_ERC20_ADDRESS
        sync: false
      - key: USDT_TO_USD_RATE
        value: "1.0"
      - key: SITE_NAME
        value: NexusAI Gateway
      - key: CORS_ORIGINS
        value: "*"
